# Dependency Review Action
#
# This Action will scan dependency manifest files that change as part of a Pull Request,
# surfacing known-vulnerable versions of the packages declared or updated in the PR.
# Once installed, if the workflow run is marked as required,
# PRs introducing known-vulnerable packages will be blocked from merging.
#
# Source repository: https://github.com/actions/dependency-review-action
name: 'Dependency Review'
on: [pull_request]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit
          disable-sudo: true
          disable-telemetry: true

      - name: 'Checkout Repository'
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          # The following vllm@0.23.0 advisories are moderate severity with no fixed
          # version available as of 6/17/2026:
          # GHSA-7h4p-rffg-7823: temperature=NaN/Infinity bypass validation and propagate to GPU kernels.
          # GHSA-8jr5-v98p-w75m: image EXIF rotation & PNG tRNS transparency not normalized.
          # GHSA-5jv2-g5wq-cmr4: GGUF dequantize kernel int truncation exposes uninitialized GPU memory.
          # GHSA-hgg8-fqqc-vfmw: incomplete CVE-2026-22778 fix leaks PIL repr addresses via Anthropic router.
          # GHSA-6pr9-rp53-2pmc: OOM denial of service via audio decompression bomb.

          # GHSA-rrmf-rvhw-rf47 (CVE-2025-3000): torch.jit.script memory corruption.
          # Affects all torch versions with no available fix as of 6/16/2026. Low severity.
          allow-ghsas: >-
            GHSA-7h4p-rffg-7823,
            GHSA-8jr5-v98p-w75m,
            GHSA-5jv2-g5wq-cmr4,
            GHSA-hgg8-fqqc-vfmw,
            GHSA-6pr9-rp53-2pmc,
            GHSA-rrmf-rvhw-rf47

