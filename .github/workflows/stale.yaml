name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit
          disable-sudo: true
          disable-telemetry: true

      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10.2.0
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            activity in the last 90 days. It will be closed in 14 days if no further
            activity occurs. Thank you for your contributions.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            activity in the last 90 days. It will be closed in 14 days if no further
            activity occurs. Thank you for your contributions.
          days-before-stale: 90
          days-before-close: 14
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'enhancement,help wanted,good first issue,security'
          exempt-pr-labels: 'enhancement,help wanted,good first issue,security'
