apiVersion: v1
kind: ConfigMap
metadata:
  name: inference-params-template
  namespace: {{ .Release.Namespace }}
data:
  inference_config.yaml: |
    # Maximum number of steps to find the max available seq len fitting in the GPU memory.
    max_probe_steps: 6

    vllm:
      cpu-offload-gb: 0
      swap-space: 4

      # gpu-memory-utilization: 0.9
      # max-seq-len-to-capture: 8192
      # num-scheduler-steps: 1
      # enable-chunked-prefill: false
      # max-model-len: 2048
      # see https://docs.vllm.ai/en/stable/serving/engine_args.html for more options.
  epp-config.yaml: |
    # see https://gateway-api-inference-extension.sigs.k8s.io/guides/epp-configuration/config-text/ for more options.
    apiVersion: inference.networking.x-k8s.io/v1alpha1
    kind: EndpointPickerConfig
    plugins:
      - type: queue-scorer # score endpoints based on vLLM queue length
      - type: kv-cache-scorer # score endpoints based on KV cache utilization
      - type: prefix-cache-scorer # score endpoints based on prefix cache hit rate
      - type: max-score-picker # pick the endpoint with the highest score
      - type: single-profile-handler # handle single scheduling profile only
    schedulingProfiles:
      - name: default
        plugins:
          - pluginRef: queue-scorer
            weight: 1
          - pluginRef: kv-cache-scorer
            weight: 1
          - pluginRef: prefix-cache-scorer
            weight: 1
          - pluginRef: max-score-picker
