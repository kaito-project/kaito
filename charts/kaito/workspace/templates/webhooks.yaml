apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validation.workspace.kaito.sh
  labels:
    {{- include "kaito.labels" . | nindent 4 }}
webhooks:
  - name: v1beta1.validation.workspace.kaito.sh
    admissionReviewVersions: ["v1"]
    matchPolicy: Exact
    clientConfig:
      service:
        name: {{ include "kaito.serviceName" . }}
        namespace: {{ .Release.Namespace }}
        port: {{ .Values.webhook.port }}
        path: /validate-kaito-sh-v1beta1-workspace
    failurePolicy: Fail
    sideEffects: None
    rules:
      - apiGroups:
          - kaito.sh
        apiVersions:
          - v1beta1
        resources:
          - workspaces
        operations:
          - CREATE
          - UPDATE
  - name: v1alpha1.validation.workspace.kaito.sh
    admissionReviewVersions: ["v1"]
    matchPolicy: Exact
    clientConfig:
      service:
        name: {{ include "kaito.serviceName" . }}
        namespace: {{ .Release.Namespace }}
        port: {{ .Values.webhook.port }}
        path: /validate-kaito-sh-v1alpha1-workspace
    failurePolicy: Fail
    sideEffects: None
    rules:
      - apiGroups:
          - kaito.sh
        apiVersions:
          - v1alpha1
        resources:
          - workspaces
        operations:
          - CREATE
          - UPDATE
{{- if .Values.featureGates.enableInferenceSetController }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validation.inferenceset.kaito.sh
  labels:
    {{- include "kaito.labels" . | nindent 4 }}
webhooks:
  - name: v1alpha1.validation.inferenceset.kaito.sh
    admissionReviewVersions: ["v1"]
    matchPolicy: Exact
    clientConfig:
      service:
        name: {{ include "kaito.serviceName" . }}
        namespace: {{ .Release.Namespace }}
        port: {{ .Values.webhook.port }}
        path: /validate-kaito-sh-v1alpha1-inferenceset
    failurePolicy: Fail
    sideEffects: None
    rules:
      - apiGroups:
          - kaito.sh
        apiVersions:
          - v1alpha1
        resources:
          - inferencesets
        operations:
          - CREATE
          - UPDATE
{{- end -}}
