apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ragengine-output-guardrails-prometheusrule.yaml

configMapGenerator:
  - name: ragengine-output-guardrails-dashboard
    files:
      - ragengine-output-guardrails-dashboard.json

generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"
