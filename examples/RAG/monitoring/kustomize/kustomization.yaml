apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: user-namespace

resources:
  - ragengine-output-guardrails-prometheusrule.yaml

configMapGenerator:
  - name: ragengine-output-guardrails-dashboard
    files:
      - ragengine-output-guardrails-dashboard.json

generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"

patches:
  - path: prometheusrule-severity-patch.yaml
    target:
      group: monitoring.coreos.com
      version: v1
      kind: PrometheusRule
      name: ragengine-output-guardrails
