models:
  - name: phi-4
    type: text-generation
    version: https://huggingface.co/microsoft/phi-4/commit/187ef0342fff0eb3333be9f00389385e95ef0b61

    # Resource sizing
    totalSafeTensorFileSize: "27.31Gi"
    diskStorageRequirement: "150Gi"
    gpuCountRequirement: "1"

    # KV cache / context window
    bytesPerToken: 204800
    modelTokenLimit: 16384

    # Startup
    readinessTimeout: 30m

    # Feature flags
    supportDistributedInference: false
    supportTuning: true

    # Runtime parameters
    runtimeParameters:
      transformers:
        baseCommand: "accelerate launch"
        inferenceMainFile: "/workspace/tfs/inference_api.py"
        accelerateParams:
          num_processes: "1"
          num_machines: "1"
          machine_rank: "0"
          gpu_ids: "all"
        modelRunParams:
          torch_dtype: "auto"
          pipeline: "text-generation"
          trust_remote_code: ""
      vllm:
        baseCommand: "python3 /workspace/vllm/inference_api.py"
        modelRunParams: {}

    # Tuning parameters
    tuning:
      totalSafeTensorFileSize: "70Gi"
      diskStorageRequirement: "150Gi"
      gpuCountRequirement: "1"
      readinessTimeout: 30m
      runtimeParameters:
        transformers:
          baseCommand: "cd /workspace/tfs/ && python3 metrics_server.py & accelerate launch"

  - name: phi-4-mini-instruct
    type: text-generation
    version: https://huggingface.co/microsoft/Phi-4-mini-instruct/commit/c0fb9e74abda11b496b7907a9c6c9009a7a0488f

    # Resource sizing
    totalSafeTensorFileSize: "7.15Gi"
    diskStorageRequirement: "70Gi"
    gpuCountRequirement: "1"

    # KV cache / context window
    bytesPerToken: 131072
    modelTokenLimit: 131072

    # Startup
    readinessTimeout: 30m

    # Feature flags
    supportDistributedInference: false
    supportTuning: true

    # Runtime parameters
    runtimeParameters:
      transformers:
        baseCommand: "accelerate launch"
        inferenceMainFile: "/workspace/tfs/inference_api.py"
        accelerateParams:
          num_processes: "1"
          num_machines: "1"
          machine_rank: "0"
          gpu_ids: "all"
        modelRunParams:
          torch_dtype: "auto"
          pipeline: "text-generation"
          trust_remote_code: ""
      vllm:
        baseCommand: "python3 /workspace/vllm/inference_api.py"
        modelRunParams:
          chat-template: "/workspace/chat_templates/tool-chat-phi4-mini.jinja"
          tool-call-parser: "phi4_mini_json"
          enable-auto-tool-choice: ""

    # Tuning parameters
    tuning:
      totalSafeTensorFileSize: "72Gi"
      diskStorageRequirement: "70Gi"
      gpuCountRequirement: "1"
      readinessTimeout: 30m
      runtimeParameters:
        transformers:
          baseCommand: "cd /workspace/tfs/ && python3 metrics_server.py & accelerate launch"
